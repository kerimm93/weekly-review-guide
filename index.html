<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Weekly Review Orchestrator</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-mid: #16213e;
      --surface: #1e2a4a;
      --surface-2: #162038;
      --surface-3: #243555;
      --border: #2a4a7f;
      --border-light: #3a6aaf;
      --ink: #e8e8f0;
      --ink-light: #9999bb;
      --ink-dim: #555577;
      --gold: #ffb347;
      --gold-light: #ffd580;
      --purple: #9b59b6;
      --purple-light: #c39bd3;
      --purple-dark: #7d3c98;
      --green: #2ecc71;
      --green-dark: #1a8a4a;
      --red: #e74c3c;
      --red-dark: #c0392b;
      --blue: #3498db;
      --blue-dark: #2176ae;
      --teal: #1abc9c;
      --teal-dark: #16a085;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
      --radius: 12px;
      --touch-min: 44px;
      --fs-content: 16px;
      --fs-btn: 13px;
      --fs-label: 11px;
      --pixel: monospace;
      --body: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(155,89,182,0.09) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 15%, rgba(52,152,219,0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 85%, rgba(255,179,71,0.06) 0%, transparent 35%);
      color: var(--ink);
      font-family: var(--body);
      font-size: var(--fs-content);
      min-height: 100vh;
    }

    #app {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px;
    }

    .htbox {
      background: linear-gradient(135deg, #2d1b69, #1a0a4a);
      border: 2px solid var(--purple);
      box-shadow: 0 0 20px rgba(155,89,182,0.25);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .htbox h1 {
      margin: 0 0 8px 0;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.4px;
    }

    .sub {
      color: var(--ink-light);
      line-height: 1.55;
      font-size: 14px;
    }

    .top-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .meta-card,
    .qs {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .meta-card {
      padding: 12px 14px;
    }

    .meta-k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--ink-light);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .meta-v {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }

    .tab-row {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-wrap: nowrap;
      background: rgba(0,0,0,.26);
      border-radius: 10px 10px 0 0;
      padding: 4px 4px 0;
      margin-top: 14px;
    }
    .tab-row::-webkit-scrollbar { display: none; }

    .tab-btn {
      font-family: var(--body);
      font-weight: 700;
      font-size: 13px;
      padding: 12px 14px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--ink-light);
      white-space: nowrap;
      flex-shrink: 0;
      min-height: var(--touch-min);
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .panel-wrap {
      background: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      padding: 16px;
      min-height: 340px;
      border-radius: 0 0 10px 10px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .qh {
      font-weight: 800;
      font-size: 13px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .qs { padding: 14px 16px; margin-bottom: 14px; }

    .notice {
      background: rgba(255,179,71,.08);
      border-left: 3px solid var(--gold);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--ink-light);
      line-height: 1.6;
      border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
    }

    .notice.info { background: rgba(52,152,219,.08); border-left-color: var(--blue); }
    .notice.success { background: rgba(46,204,113,.08); border-left-color: var(--green); }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      font-family: var(--body);
      font-weight: 700;
      font-size: var(--fs-btn);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-height: var(--touch-min);
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .btn-q { background: linear-gradient(135deg, var(--gold), #e8960a); color: #1a0a00; }
    .btn-m { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: white; }
    .btn-v { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: white; }
    .btn-s { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }
    .btn-t { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; }
    .btn-d { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: white; }
    .btn:disabled { opacity: .42; cursor: not-allowed; }

    input, textarea, select {
      width: 100%;
      background: rgba(0,0,0,.24);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--body);
      font-size: var(--fs-content);
      padding: 10px 12px;
      min-height: var(--touch-min);
      border-radius: 8px;
    }

    textarea { resize: vertical; min-height: 120px; }
    textarea.compact { min-height: 84px; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(155,89,182,.18);
    }

    label {
      display: block;
      margin: 12px 0 6px 0;
      font-size: var(--fs-label);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .55px;
      color: var(--ink-light);
    }

    .step-list { display: grid; gap: 12px; }

    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .step-head {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: start;
    }

    .step-title {
      font-weight: 800;
      font-size: 18px;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .step-sub {
      color: var(--ink-light);
      font-size: 13px;
      line-height: 1.55;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      border-radius: 999px;
      padding: 0 11px;
      border: 1px solid var(--border);
      color: var(--ink-light);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(0,0,0,.18);
    }

    .step-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .step-meta {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink-light);
      margin-top: 10px;
    }

    .check-row input[type="checkbox"] {
      width: 20px;
      min-height: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .progress {
      height: 12px;
      background: rgba(0,0,0,.28);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      transition: width .2s ease;
    }

    .prompt-output {
      min-height: 360px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
    }

    .small {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.55;
    }

    .session-list {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
    }

    .session-item {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.2);
      cursor: pointer;
    }

    .session-item.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(255,179,71,.25) inset;
    }

    .session-item strong { display: block; margin-bottom: 6px; }

    .kv {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 8px;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .kv .k { color: var(--ink-light); font-weight: 700; }

    .table-lite {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-lite th,
    .table-lite td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    .table-lite th {
      color: var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: var(--purple-dark);
      border: 1px solid var(--purple);
      border-radius: 999px;
      padding: 4px 9px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .badge-readonly {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--blue);
      color: var(--ink);
      background: rgba(52,152,219,.12);
      font-size: 12px;
      font-weight: 800;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--gold-light);
    }

    #toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--purple);
      color: var(--gold);
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
      transform: translateY(90px);
      opacity: 0;
      transition: all .2s ease;
      z-index: 999;
      font-size: 13px;
      font-weight: 700;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .grid-2, .grid-3, .top-meta, .step-meta {
        grid-template-columns: 1fr;
      }
      .step-head {
        grid-template-columns: 1fr;
      }
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="htbox">
      <h1>Weekly Review Orchestrator</h1>
      <div class="sub">
        Leit-App für deinen Weekly-Review-Ablauf mit Prompt-Weitergabe. Sie bildet den groben Neurolist-Flow ab,
        hält Session-Daten lokal fest und generiert dir pro Schritt kopierbare GPT-Prompts.
      </div>
      <div class="top-meta">
        <div class="meta-card">
          <div class="meta-k">Aktive Woche</div>
          <div class="meta-v" id="metaWeek">—</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Fortschritt</div>
          <div class="meta-v" id="metaProgress">0 / 7</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Offene Minuten</div>
          <div class="meta-v" id="metaMinutes">100</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Zuletzt gespeichert</div>
          <div class="meta-v" id="metaSaved" style="font-size:14px;color:var(--ink)">—</div>
        </div>
      </div>
    </div>

    <div class="tab-row" id="tabRow"></div>
    <div class="panel-wrap">
      <section class="panel active" id="panel-dashboard"></section>
      <section class="panel" id="panel-steps"></section>
      <section class="panel" id="panel-prompts"></section>
      <section class="panel" id="panel-data"></section>
      <section class="panel" id="panel-export"></section>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    var LKEY = 'weekly_review_orchestrator_v1';
    var GIST_FILE = 'weekly_review_orchestrator_data.json';
    var GIST_TOKEN_KEY = 'weekly_review_orchestrator_gist_token';
    var GIST_ID_KEY = 'weekly_review_orchestrator_gist_id';
    var GIST_API_ROOT = 'https://api.github.com/gists/';
    var AUTO_SYNC_DELAY = 30000;
    var DAILY_LOG_READ_GIST_ID_KEY = 'weekly_review_orchestrator_dailylog_read_gist_id';
    var DAILY_LOG_READ_TOKEN_KEY = 'weekly_review_orchestrator_dailylog_read_token';
    var autoSyncTimer = null;
    var hasTriedStartupSync = false;

    var TABS = [
      { id: 'dashboard', label: 'Dashboard' },
      { id: 'steps', label: 'Schritte' },
      { id: 'prompts', label: 'Prompt Studio' },
      { id: 'data', label: 'Session-Daten' },
      { id: 'export', label: 'Export' }
    ];

    var DEFAULT_STEPS = [
      {
        id: 'finish_daily_notes',
        title: 'Letzte Daily Notes fertigstellen',
        minutes: 20,
        icon: '🧾',
        summary: 'Die Rohbasis schließen, bevor du in Konvertierung und Review gehst.',
        purpose: 'Stellt sicher, dass deine Wochenbasis vollständig ist und die Review nicht auf halben Notizen läuft.',
        promptType: 'finishDailyNotes'
      },
      {
        id: 'convert_days',
        title: 'Tage der Woche aus dem Bullet Journal in ChatGPT umwandeln (für Obsidian-Format)',
        minutes: 15,
        icon: '↩️',
        summary: 'Tagesblöcke in ein strukturiertes, weiterverarbeitbares Format überführen.',
        purpose: 'Erzeugt sauberere Eingaben für Annotationen, spätere Review und Obsidian-Weiterverarbeitung.',
        promptType: 'convertDays'
      },
      {
        id: 'review_days_new_format',
        title: 'Tage der Woche im neuen Format überfliegen und Anmerkungen diktieren',
        minutes: 15,
        icon: '🎤',
        summary: 'Erste Muster, Lücken, Beobachtungen und Zusatzgedanken festhalten.',
        purpose: 'Bringt deine zweite Verarbeitungsschicht rein, bevor die eigentliche Weekly Review startet.',
        promptType: 'reviewAnnotations'
      },
      {
        id: 'save_quant_data',
        title: 'Quantitative Daten speichern (für Auswertung)',
        minutes: 10,
        icon: '💾',
        summary: 'Stimmungs-, Zeit-, Habit- und Bewegungsdaten als Wocheninput sichern.',
        purpose: 'Schafft die optionale Datengrundlage für Mustererkennung über dein Erleben hinaus.',
        promptType: 'quantData'
      },
      {
        id: 'migrate_tasks',
        title: 'Aufgaben aus dem Bullet Journal migrieren',
        minutes: 15,
        icon: '➡️',
        summary: 'Offene Aufgaben in ein klares Folgesystem übertragen.',
        purpose: 'Verhindert, dass die Review endet und lose offene Fäden im Bullet Journal hängen bleiben.',
        promptType: 'migrateTasks'
      },
      {
        id: 'open_last_weekly_log',
        title: 'Weekly Log Chat öffnen (letzte Woche) für Prompts und Schritt-für-Schritt-Anleitung',
        minutes: 5,
        icon: '💬',
        summary: 'Alten Weekly-Log-Kontext und Review-Regeln wieder in Reichweite bringen.',
        purpose: 'Holt den Review-Workflow mit seinen Betriebsmodi, Eingaberegeln und Promptstrukturen wieder nach vorn.',
        promptType: 'openLastWeeklyLog'
      },
      {
        id: 'write_current_weekly_review',
        title: 'Aktuelle Weekly Review im Weekly Log Chat schreiben',
        minutes: 20,
        icon: '🖊️',
        summary: 'Die eigentliche Weekly Review auf Basis aller vorbereiteten Inputs starten.',
        purpose: 'Jetzt wird aus Material eine vollständige Review mit klarer Trennung von Beobachtung, Interpretation und Entscheidung.',
        promptType: 'startWeeklyReview'
      }
    ];

    var S = {
      version: 1,
      currentTab: 'dashboard',
      currentSessionId: '',
      sessions: [],
      dailyLogReadCache: {
        loadedAt: '',
        gistId: '',
        fileName: '',
        sourceKind: 'external_read_only_gist',
        rawText: '',
        days: [],
        weeks: []
      }
    };

    function uid() {
      return String(Date.now()) + String(Math.random()).slice(2, 8);
    }

    function today() {
      return new Date().toISOString().split('T')[0];
    }

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2200);
    }

    function blankSession() {
      var steps = DEFAULT_STEPS.map(function (step) {
        return {
          id: step.id,
          done: false,
          notes: '',
          artifacts: '',
          promptNotes: ''
        };
      });
      return {
        id: uid(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        weekLabel: 'KW ' + guessWeekLabel(),
        reviewDate: today(),
        lastWeeklyLogUrl: '',
        targetChat: 'Weekly Log Chat',
        currentFocus: '',
        weeklyIntent: '',
        dailyNotesRaw: '',
        bulletJournalRaw: '',
        convertedDays: '',
        annotations: '',
        quantData: '',
        migratedTasks: '',
        previousWeeklyLogSummary: '',
        reviewResult: '',
        nextWeekPreview: '',
        dailyLogSelection: {
          mode: 'week',
          weekKey: '',
          rangeStart: '',
          rangeEnd: ''
        },
        dailyLogReadMeta: {
          loadedAt: '',
          sourceGistId: '',
          sourceFile: '',
          sourceKind: 'external_read_only_gist',
          lastAppliedAt: '',
          selectedLabel: ''
        },
        weeklyTaskOverview: {
          weeklyLog: [],
          futureLog: [],
          uncertain: []
        },
        steps: steps,
        promptHistory: []
      };
    }

    function guessWeekLabel() {
      var d = new Date();
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return weekNo + ' – ' + d.getUTCFullYear();
    }

    function load() {
      try {
        var raw = localStorage.getItem(LKEY);
        if (raw) S = JSON.parse(raw);
      } catch (e) {}
      if (!Array.isArray(S.sessions)) S.sessions = [];
      if (!S.currentTab) S.currentTab = 'dashboard';
      if (!S.dailyLogReadCache) {
        S.dailyLogReadCache = {
          loadedAt: '',
          gistId: '',
          fileName: '',
          sourceKind: 'external_read_only_gist',
          rawText: '',
          days: [],
          weeks: []
        };
      }
      if (!S.sessions.length) {
        var first = blankSession();
        S.sessions.push(first);
        S.currentSessionId = first.id;
      }
      if (!getSession()) {
        S.currentSessionId = S.sessions[0].id;
      }
      normalizeState();
    }

    function normalizeState() {
      var fresh = blankSession();
      S.sessions.forEach(function (session) {
        Object.keys(fresh).forEach(function (key) {
          if (session[key] === undefined) session[key] = JSON.parse(JSON.stringify(fresh[key]));
        });
        if (!session.steps || !session.steps.length) {
          session.steps = blankSession().steps;
        }
        DEFAULT_STEPS.forEach(function (def) {
          var existing = session.steps.find(function (s) { return s.id === def.id; });
          if (!existing) session.steps.push({ id: def.id, done: false, notes: '', artifacts: '', promptNotes: '' });
        });
        if (!session.dailyLogSelection) session.dailyLogSelection = JSON.parse(JSON.stringify(fresh.dailyLogSelection));
        if (!session.dailyLogReadMeta) session.dailyLogReadMeta = JSON.parse(JSON.stringify(fresh.dailyLogReadMeta));
        if (!session.weeklyTaskOverview) session.weeklyTaskOverview = JSON.parse(JSON.stringify(fresh.weeklyTaskOverview));
        session.updatedAt = session.updatedAt || session.createdAt || new Date().toISOString();
      });
      if (!S.dailyLogReadCache.weeks) S.dailyLogReadCache.weeks = [];
      if (!S.dailyLogReadCache.days) S.dailyLogReadCache.days = [];
    }

    function save(skipAutoSync, preserveExported, preserveActiveSessionTimestamp) {
      if (!preserveExported || !S._lastExported) S._lastExported = new Date().toISOString();
      var session = getSession();
      if (session && !preserveActiveSessionTimestamp) session.updatedAt = new Date().toISOString();
      try {
        localStorage.setItem(LKEY, JSON.stringify(S));
      } catch (e) {}
      updateMeta();
      if (!skipAutoSync) gistAutoSyncDebounced();
    }

    function getSession() {
      return S.sessions.find(function (s) { return s.id === S.currentSessionId; }) || null;
    }

    function getStepData(stepId) {
      var session = getSession();
      if (!session) return null;
      return session.steps.find(function (s) { return s.id === stepId; }) || null;
    }

    function switchTab(tabId, skipSave) {
      S.currentTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.panel').forEach(function (panel) {
        panel.classList.toggle('active', panel.id === 'panel-' + tabId);
      });
      if (!skipSave) save();
    }

    function renderTabs() {
      var row = document.getElementById('tabRow');
      row.innerHTML = TABS.map(function (tab) {
        return '<button class="tab-btn ' + (tab.id === S.currentTab ? 'active' : '') + '" data-tab="' + tab.id + '" onclick="switchTab(\'' + tab.id + '\')">' + esc(tab.label) + '</button>';
      }).join('');
    }

    function completedCount(session) {
      return session.steps.filter(function (s) { return s.done; }).length;
    }

    function remainingMinutes(session) {
      var total = 0;
      DEFAULT_STEPS.forEach(function (def) {
        var st = session.steps.find(function (s) { return s.id === def.id; });
        if (!st || !st.done) total += def.minutes;
      });
      return total;
    }

    function updateMeta() {
      var session = getSession();
      if (!session) return;
      document.getElementById('metaWeek').textContent = session.weekLabel || '—';
      document.getElementById('metaProgress').textContent = completedCount(session) + ' / ' + DEFAULT_STEPS.length;
      document.getElementById('metaMinutes').textContent = String(remainingMinutes(session));
      document.getElementById('metaSaved').textContent = session.updatedAt ? new Date(session.updatedAt).toLocaleString('de-DE') : '—';
    }

    function patchSession(field, value) {
      var session = getSession();
      if (!session) return;
      session[field] = value;
      save();
      renderAll();
    }

    function patchStep(stepId, field, value) {
      var st = getStepData(stepId);
      if (!st) return;
      st[field] = value;
      save();
      renderAll();
    }

    function patchDailyLogSelection(field, value) {
      var session = getSession();
      if (!session) return;
      if (!session.dailyLogSelection) session.dailyLogSelection = blankSession().dailyLogSelection;
      session.dailyLogSelection[field] = value;
      if (field === 'mode' && value === 'week' && !session.dailyLogSelection.weekKey && S.dailyLogReadCache.weeks.length) {
        session.dailyLogSelection.weekKey = S.dailyLogReadCache.weeks[0].key;
      }
      save();
      renderAll();
    }

    function newSession() {
      var s = blankSession();
      S.sessions.unshift(s);
      S.currentSessionId = s.id;
      save();
      renderAll();
      toast('Neue Weekly-Review-Session angelegt');
    }

    function deleteSession() {
      if (S.sessions.length <= 1) {
        toast('Mindestens eine Session muss bleiben');
        return;
      }
      var session = getSession();
      if (!session) return;
      var ok = confirm('Aktive Session wirklich löschen?');
      if (!ok) return;
      S.sessions = S.sessions.filter(function (s) { return s.id !== session.id; });
      S.currentSessionId = S.sessions[0].id;
      save();
      renderAll();
      toast('Session gelöscht');
    }

    function duplicateSession() {
      var session = getSession();
      if (!session) return;
      var copy = JSON.parse(JSON.stringify(session));
      copy.id = uid();
      copy.createdAt = new Date().toISOString();
      copy.updatedAt = new Date().toISOString();
      copy.weekLabel = session.weekLabel + ' (Kopie)';
      S.sessions.unshift(copy);
      S.currentSessionId = copy.id;
      save();
      renderAll();
      toast('Session dupliziert');
    }

      S.currentSessionId = id;
      save();

    function buildPrompt(type, copyDirectly) {

          rememberPrompt(type, prompt);
          toast('Prompt kopiert');
        }).catch(function () {
          rememberPrompt(type, prompt);
          toast('Kopieren fehlgeschlagen');
        });
      }
      return prompt;
    }

    function rememberPrompt(type, prompt) {
      var session = getSession();
      if (!session) return;
      session.promptHistory.unshift({
        id: uid(),
        type: type,
        createdAt: new Date().toISOString(),
        prompt: prompt
      });
      session.promptHistory = session.promptHistory.slice(0, 12);
      save();

      var st = getStepData(stepId);

    function firstNonEmpty() {
      for (var i = 0; i < arguments.length; i++) {
        if (arguments[i] !== undefined && arguments[i] !== null && arguments[i] !== '') return arguments[i];
      }
      return '';
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value === undefined || value === null || value === '') return [];
      return [value];
    }

    function toReadableText(value) {
      if (value === undefined || value === null) return '';
      if (typeof value === 'string') return value;
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      try {
        return JSON.stringify(value);
      } catch (e) {
        return '';
      }
    }

    function looksLikeDateString(value) {
      return /^\d{4}-\d{2}-\d{2}/.test(String(value || ''));
    }

    function coerceDateOnly(value) {
      if (!value) return '';
      if (looksLikeDateString(value)) return String(value).slice(0, 10);
      var d = new Date(value);
      if (isNaN(d.getTime())) return '';
      return d.toISOString().slice(0, 10);
    }

    function normalizeHorizon(value) {
      var v = String(value || '').trim().toLowerCase();
      if (!v) return '';
      if (['weekly_log', 'weeklylog', 'weekly', 'week', 'current_week', 'current', 'immediate', 'planning'].indexOf(v) !== -1) return 'weekly_log';
      if (['future_log', 'futurelog', 'future', 'later', 'someday', 'backlog', 'later_maybe'].indexOf(v) !== -1) return 'future_log';
      return v.replace(/\s+/g, '_');
    }

    function normalizeLooseItem(item) {
      if (typeof item === 'string') return { text: item };
      if (!item || typeof item !== 'object') return { text: String(item || '') };
      return Object.assign({}, item, {
        text: firstNonEmpty(item.text, item.title, item.label, item.name, item.task, item.event, item.description)
      });
    }

    function normalizeTaskItem(item) {
      var base = normalizeLooseItem(item);
      return {
        text: base.text,
        status: firstNonEmpty(base.status, base.state, ''),
        done: !!base.done,
        id: firstNonEmpty(base.id, base.taskId, '')
      };
    }

    function normalizeEventItem(item) {
      var base = normalizeLooseItem(item);
      return {
        text: base.text,
        kind: firstNonEmpty(base.kind, base.type, ''),
        id: firstNonEmpty(base.id, base.eventId, '')
      };
    }

    function normalizeMigrationItem(item, fallbackDate) {
      var base = normalizeLooseItem(item);
      return {
        text: base.text,
        date: coerceDateOnly(firstNonEmpty(base.date, fallbackDate)),
        direction: firstNonEmpty(base.direction, base.flow, base.move, ''),
        sourceHorizon: normalizeHorizon(firstNonEmpty(base.sourceHorizon, base.from, '')),
        targetHorizon: normalizeHorizon(firstNonEmpty(base.targetHorizon, base.horizon, base.target, base.destination, base.to, '')),
        targetLabel: firstNonEmpty(base.targetLabel, base.destinationLabel, base.target, base.destination, ''),
        id: firstNonEmpty(base.id, base.taskId, '')
      };
    }

    function collectQuantText(day) {
      var parts = [];
      var pairs = [
        ['mood', day.mood],
        ['daylio', day.daylio],
        ['habits', day.habits],
        ['toggl', day.toggl],
        ['timeTracking', day.timeTracking],
        ['movement', day.movement],
        ['sport', day.sport],
        ['sleep', day.sleep],
        ['metrics', day.metrics],
        ['quantData', day.quantData]
      ];
      pairs.forEach(function (pair) {
        var txt = toReadableText(pair[1]);
        if (txt) parts.push(pair[0] + ': ' + txt);
      });
      return parts.join('\n');
    }

    function normalizeImportedDay(day) {
      var date = coerceDateOnly(firstNonEmpty(day.date, day.dayDate, day.isoDate, day.day, day.createdAt, day.updatedAt));
      var tasks = asArray(firstNonEmpty(day.tasks, day.openTasks, day.dailyTasks, day.todos, [])).map(normalizeTaskItem).filter(function (item) { return item.text; });
      var events = asArray(firstNonEmpty(day.events, day.logEvents, day.eventItems, [])).map(normalizeEventItem).filter(function (item) { return item.text; });
      var migrations = asArray(firstNonEmpty(day.migrations, day.taskMigrations, day.movedTasks, day.migrationLog, [])).map(function (item) {
        return normalizeMigrationItem(item, date);
      }).filter(function (item) { return item.text || item.targetHorizon; });
      return {
        date: date,
        title: firstNonEmpty(day.title, day.label, ''),
        notes: firstNonEmpty(day.notes, day.note, day.body, day.content, day.summary, ''),
        bulletJournalRaw: firstNonEmpty(day.bulletJournalRaw, day.bujoRaw, day.rawBulletJournal, day.rapidLogRaw, ''),
        annotations: firstNonEmpty(day.annotations, day.reviewNotes, day.annotationText, ''),
        quantText: collectQuantText(day),
        tasks: tasks,
        events: events,
        migrations: migrations
      };
    }

    function looksLikeDayObject(obj) {
      if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
      return !!firstNonEmpty(obj.date, obj.dayDate, obj.isoDate, obj.day, obj.createdAt, obj.updatedAt, obj.notes, obj.note, obj.tasks, obj.events, obj.migrations, obj.taskMigrations, obj.movedTasks);
    }

    function extractDayArray(payload) {
      if (!payload) return [];
      var directCandidates = [
        payload.days,
        payload.dailyLogs,
        payload.entries,
        payload.logs,
        payload.items,
        payload.cards,
        payload.records,
        payload.data && payload.data.days,
        payload.state && payload.state.days,
        payload.S && payload.S.days
      ];
      for (var i = 0; i < directCandidates.length; i++) {
        if (Array.isArray(directCandidates[i])) return directCandidates[i];
      }

      var found = [];
      function walk(node, depth) {
        if (!node || depth > 4) return;
        if (Array.isArray(node)) {
          if (node.length && node.some(looksLikeDayObject)) found.push(node);
          node.forEach(function (item) { walk(item, depth + 1); });
          return;
        }
        if (typeof node === 'object') {
          Object.keys(node).forEach(function (key) {
            walk(node[key], depth + 1);
          });
        }
      }
      walk(payload, 0);
      if (!found.length) return [];
      found.sort(function (a, b) { return b.length - a.length; });
      return found[0];
    }

    function isoWeekInfo(dateStr) {
      var d = new Date(dateStr + 'T00:00:00Z');
      if (isNaN(d.getTime())) return null;
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return {
        key: d.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0'),
        label: 'KW ' + weekNo + ' – ' + d.getUTCFullYear()
      };
    }

    function buildWeekBuckets(days) {
      var map = {};
      (days || []).forEach(function (day) {
        if (!day.date) return;
        var info = isoWeekInfo(day.date);
        if (!info) return;
        if (!map[info.key]) {
          map[info.key] = { key: info.key, label: info.label, start: day.date, end: day.date, count: 0 };
        }
        map[info.key].count += 1;
        if (day.date < map[info.key].start) map[info.key].start = day.date;
        if (day.date > map[info.key].end) map[info.key].end = day.date;
      });
      return Object.keys(map).map(function (key) { return map[key]; }).sort(function (a, b) {
        return a.start < b.start ? -1 : 1;
      });
    }

    function buildWeeklyTaskOverview(days) {
      var out = { weeklyLog: [], futureLog: [], uncertain: [] };
      (days || []).forEach(function (day) {
        (day.migrations || []).forEach(function (mig) {
          var item = {
            date: mig.date || day.date || '',
            text: mig.text || '',
            direction: mig.direction || '',
            sourceHorizon: mig.sourceHorizon || '',
            targetHorizon: mig.targetHorizon || '',
            targetLabel: mig.targetLabel || '',
            id: mig.id || ''
          };
          if (!item.text) return;
          if (item.targetHorizon === 'weekly_log') out.weeklyLog.push(item);
          else if (item.targetHorizon === 'future_log') out.futureLog.push(item);
          else out.uncertain.push(item);
        });
      });
      return out;
    }

    function getDailyLogReadConfig() {
      return {
        gistId: (localStorage.getItem(DAILY_LOG_READ_GIST_ID_KEY) || '').trim(),
        token: (localStorage.getItem(DAILY_LOG_READ_TOKEN_KEY) || '').trim()
      };
    }

    function setDailyLogReadGistId(value) {
      if ((value || '').trim()) localStorage.setItem(DAILY_LOG_READ_GIST_ID_KEY, value.trim());
      else localStorage.removeItem(DAILY_LOG_READ_GIST_ID_KEY);
      renderAll();
      toast('Daily-Log-Gist-ID lokal gespeichert');
    }

    function setDailyLogReadToken(value) {
      if ((value || '').trim()) localStorage.setItem(DAILY_LOG_READ_TOKEN_KEY, value.trim());
      else localStorage.removeItem(DAILY_LOG_READ_TOKEN_KEY);
      renderAll();
      toast('Daily-Log-Read-Token lokal gespeichert');
    }

    function clearDailyLogReadConfig() {
      var ok = confirm('Read-only-Konfiguration für die externe Daily-Log-Quelle wirklich lokal löschen?');
      if (!ok) return;
      localStorage.removeItem(DAILY_LOG_READ_GIST_ID_KEY);
      localStorage.removeItem(DAILY_LOG_READ_TOKEN_KEY);
      renderAll();
      toast('Daily-Log-Read-Konfiguration gelöscht');
    }

    function dailyLogReadHeaders(token) {
      var h = { 'Accept': 'application/vnd.github+json' };
      if (token) h['Authorization'] = 'token ' + token;
      return h;
    }

    function pickDailyLogReadFile(json) {
      var files = json && json.files ? Object.keys(json.files).map(function (key) { return json.files[key]; }) : [];
      if (!files.length) throw new Error('Keine Dateien im Daily-Log-Gist gefunden');
      files.sort(function (a, b) {
        var aScore = (/\.json$/i.test(a.filename || '') ? 2 : 0) + ((a.type || '').indexOf('json') !== -1 ? 2 : 0);
        var bScore = (/\.json$/i.test(b.filename || '') ? 2 : 0) + ((b.type || '').indexOf('json') !== -1 ? 2 : 0);
        if (aScore !== bScore) return bScore - aScore;
        return (b.size || 0) - (a.size || 0);
      });
      return files[0];
    }

    function parseDailyLogPayloadFromFile(file) {
      if (!file || !file.content) throw new Error('Daily-Log-Gist-Datei enthält keinen direkt lesbaren Inhalt');
      return JSON.parse(file.content);
    }

    function getSelectedDailyLogDays(session) {
      var days = (S.dailyLogReadCache && S.dailyLogReadCache.days) || [];
      if (!days.length) return [];
      var sel = session.dailyLogSelection || blankSession().dailyLogSelection;
      if (sel.mode === 'range') {
        return days.filter(function (day) {
          if (!day.date) return false;
          if (sel.rangeStart && day.date < sel.rangeStart) return false;
          if (sel.rangeEnd && day.date > sel.rangeEnd) return false;
          return true;
        });
      }
      if (!sel.weekKey) return [];
      return days.filter(function (day) {
        var info = day.date ? isoWeekInfo(day.date) : null;
        return info && info.key === sel.weekKey;
      });
    }

    function getSelectedDailyLogLabel(session) {
      var sel = session.dailyLogSelection || blankSession().dailyLogSelection;
      if (sel.mode === 'range') {
        return (sel.rangeStart || 'offen') + ' → ' + (sel.rangeEnd || 'offen');
      }
      var match = (S.dailyLogReadCache.weeks || []).find(function (week) { return week.key === sel.weekKey; });
      return match ? (match.label + ' (' + match.start + ' → ' + match.end + ')') : 'Keine Woche gewählt';
    }

    function ensureDailyLogWeekSelection(session) {
      if (!session || !session.dailyLogSelection) return;
      if (session.dailyLogSelection.mode !== 'week') return;
      if (!session.dailyLogSelection.weekKey && S.dailyLogReadCache.weeks.length) {
        session.dailyLogSelection.weekKey = S.dailyLogReadCache.weeks[0].key;
      }
    }

    async function loadDailyLogFromGist() {
      var cfg = getDailyLogReadConfig();
      if (!cfg.gistId) {
        toast('Bitte erst die Daily-Log-Gist-ID eintragen');
        return;
      }
      try {
        var res = await fetchWithTimeoutRetry(GIST_API_ROOT + encodeURIComponent(cfg.gistId), {
          headers: dailyLogReadHeaders(cfg.token)
        }, 15000, 1);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var json = await res.json();
        var file = pickDailyLogReadFile(json);
        var payload = parseDailyLogPayloadFromFile(file);
        var rawText = file.content;
        var rawDays = extractDayArray(payload);
        var days = rawDays.map(normalizeImportedDay).filter(function (day) {
          return day.date || day.notes || day.tasks.length || day.events.length || day.migrations.length || day.quantText || day.annotations || day.bulletJournalRaw;
        });
        var weeks = buildWeekBuckets(days);
        S.dailyLogReadCache = {
          loadedAt: new Date().toISOString(),
          gistId: cfg.gistId,
          fileName: file.filename || '',
          sourceKind: 'external_read_only_gist',
          rawText: rawText,
          days: days,
          weeks: weeks
        };
        var session = getSession();
        if (session) {
          session.dailyLogReadMeta.loadedAt = S.dailyLogReadCache.loadedAt;
          session.dailyLogReadMeta.sourceGistId = cfg.gistId;
          session.dailyLogReadMeta.sourceFile = file.filename || '';
          session.dailyLogReadMeta.sourceKind = 'external_read_only_gist';
          ensureDailyLogWeekSelection(session);
        }
        save();
        renderAll();
        toast('Daily-Log-Daten read-only geladen');
      } catch (e) {
        alert('Fehler beim Lesen des externen Daily-Log-Gist: ' + ((e && e.message) || e));
      }
    }

    function clearDailyLogCache() {
      var ok = confirm('Geladene externe Daily-Log-Daten aus dem lokalen Weekly-Review-Cache entfernen?');
      if (!ok) return;
      S.dailyLogReadCache = {
        loadedAt: '',
        gistId: '',
        fileName: '',
        sourceKind: 'external_read_only_gist',
        rawText: '',
        days: [],
        weeks: []
      };
      var session = getSession();
      if (session) {
        session.dailyLogReadMeta = blankSession().dailyLogReadMeta;
        session.dailyLogSelection = blankSession().dailyLogSelection;
        session.weeklyTaskOverview = blankSession().weeklyTaskOverview;
      }
      save();
      renderAll();
      toast('Daily-Log-Cache geleert');
    }

    function buildDailyNotesFromDays(days) {
      var chunks = [];
      (days || []).forEach(function (day) {
        if (day.notes) chunks.push('# ' + (day.date || 'Ohne Datum') + '\n' + day.notes);
      });
      return chunks.join('\n\n');
    }

    function buildBulletJournalFromDays(days) {
      var chunks = [];
      (days || []).forEach(function (day) {
        if (day.bulletJournalRaw) chunks.push('# ' + (day.date || 'Ohne Datum') + '\n' + day.bulletJournalRaw);
      });
      return chunks.join('\n\n');
    }

    function buildConvertedDaysFromDays(days) {
      var chunks = [];
      (days || []).forEach(function (day) {
        if (!day.date && !day.notes && !day.tasks.length && !day.events.length && !day.migrations.length) return;
        var block = [];
        block.push('# ' + (day.date || 'Ohne Datum'));
        if (day.events.length) {
          block.push('## Ereignisse');
          day.events.forEach(function (item) { block.push('- ' + item.text + (item.kind ? ' [' + item.kind + ']' : '')); });
        }
        if (day.tasks.length) {
          block.push('## Aufgaben');
          day.tasks.forEach(function (item) { block.push('- ' + item.text + (item.status ? ' [' + item.status + ']' : '')); });
        }
        if (day.migrations.length) {
          block.push('## Migrationen');
          day.migrations.forEach(function (item) {
            block.push('- ' + (item.text || '—') + ' | Richtung: ' + (item.direction || '—') + ' | Zielhorizont: ' + (item.targetHorizon || '—') + ' | Ziel: ' + (item.targetLabel || '—'));
          });
        }
        if (day.notes) {
          block.push('## Notizen');
          block.push(day.notes);
        }
        chunks.push(block.join('\n'));
      });
      return chunks.join('\n\n');
    }

    function buildAnnotationsFromDays(days) {
      var chunks = [];
      (days || []).forEach(function (day) {
        if (day.annotations) chunks.push('# ' + (day.date || 'Ohne Datum') + '\n' + day.annotations);
      });
      return chunks.join('\n\n');
    }

    function buildQuantDataFromDays(days) {
      var chunks = [];
      (days || []).forEach(function (day) {
        if (day.quantText) chunks.push('# ' + (day.date || 'Ohne Datum') + '\n' + day.quantText);
      });
      return chunks.join('\n\n');
    }

    function buildMigratedTasksFromDays(days) {
      var overview = buildWeeklyTaskOverview(days);
      var lines = [];
      lines.push('Weekly Log – kurzfristig / konkret');
      if (overview.weeklyLog.length) overview.weeklyLog.forEach(function (item) { lines.push('- ' + (item.date || '—') + ' · ' + item.text + ' · ' + (item.targetLabel || item.targetHorizon || '—')); });
      else lines.push('- Keine robust ableitbaren Einträge');
      lines.push('');
      lines.push('Future Log – unspezifische Zukunft');
      if (overview.futureLog.length) overview.futureLog.forEach(function (item) { lines.push('- ' + (item.date || '—') + ' · ' + item.text + ' · ' + (item.targetLabel || item.targetHorizon || '—')); });
      else lines.push('- Keine robust ableitbaren Einträge');
      if (overview.uncertain.length) {
        lines.push('');
        lines.push('Unklare Zielhorizonte');
        overview.uncertain.forEach(function (item) { lines.push('- ' + (item.date || '—') + ' · ' + item.text + ' · ' + (item.targetLabel || item.targetHorizon || 'unbekannt')); });
      }
      return lines.join('\n');
    }

    function applySelectedDailyLogWeekToSession() {
      var session = getSession();
      if (!session) return;
      var days = getSelectedDailyLogDays(session);
      if (!days.length) {
        toast('Keine Daily-Log-Tage für die aktuelle Auswahl gefunden');
        return;
      }
      var dailyNotes = buildDailyNotesFromDays(days);
      var bulletRaw = buildBulletJournalFromDays(days);
      var converted = buildConvertedDaysFromDays(days);
      var annotations = buildAnnotationsFromDays(days);
      var quantData = buildQuantDataFromDays(days);
      var migrated = buildMigratedTasksFromDays(days);
      if (dailyNotes) session.dailyNotesRaw = dailyNotes;
      if (bulletRaw) session.bulletJournalRaw = bulletRaw;
      if (converted) session.convertedDays = converted;
      if (annotations) session.annotations = annotations;
      if (quantData) session.quantData = quantData;
      if (migrated) session.migratedTasks = migrated;
      session.weeklyTaskOverview = buildWeeklyTaskOverview(days);
      session.dailyLogReadMeta.loadedAt = S.dailyLogReadCache.loadedAt || session.dailyLogReadMeta.loadedAt;
      session.dailyLogReadMeta.sourceGistId = S.dailyLogReadCache.gistId || session.dailyLogReadMeta.sourceGistId;
      session.dailyLogReadMeta.sourceFile = S.dailyLogReadCache.fileName || session.dailyLogReadMeta.sourceFile;
      session.dailyLogReadMeta.sourceKind = 'external_read_only_gist';
      session.dailyLogReadMeta.lastAppliedAt = new Date().toISOString();
      session.dailyLogReadMeta.selectedLabel = getSelectedDailyLogLabel(session);
      save();
      renderAll();
      toast('Gewählte Daily-Log-Woche in die Session übernommen');
    }

    function renderDailyLogSourceHTML(session) {
      var cfg = getDailyLogReadConfig();
      var cache = S.dailyLogReadCache || { days: [], weeks: [] };
      return `
        <div class="notice info">Diese Anbindung ist strikt read-only. Sie liest Daily-Log-Daten aus einem separaten Gist per <code>GET</code> und schreibt nie in diese Quelle zurück.</div>
        <label>Daily-Log-Gist-ID</label>
        <input value="${esc(cfg.gistId)}" onchange="setDailyLogReadGistId(this.value)" placeholder="Externe Gist-ID der Daily-Log-App" />
        <label>Optionaler Daily-Log-Read-Token</label>
        <input type="password" value="${esc(cfg.token)}" onchange="setDailyLogReadToken(this.value)" placeholder="Nur falls das externe Gist nicht öffentlich lesbar ist" />
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-s" onclick="loadDailyLogFromGist()">Externe Daten laden</button>
          <button class="btn btn-d" onclick="clearDailyLogCache()">Geladene Daten entfernen</button>
          <button class="btn btn-m" onclick="clearDailyLogReadConfig()">Read-only-Konfig löschen</button>
        </div>
        <div class="small" style="margin-top:12px">Quelle: <strong>${esc(session.dailyLogReadMeta.sourceKind || 'external_read_only_gist')}</strong></div>
        <div class="kv" style="margin-top:12px"><div class="k">Geladen am</div><div>${esc(cache.loadedAt ? new Date(cache.loadedAt).toLocaleString('de-DE') : '—')}</div></div>
        <div class="kv"><div class="k">Gist</div><div>${esc(cache.gistId || '—')}</div></div>
        <div class="kv"><div class="k">Datei</div><div>${esc(cache.fileName || '—')}</div></div>
        <div class="kv"><div class="k">Tage im Cache</div><div>${cache.days ? cache.days.length : 0}</div></div>
      `;
    }

    function renderDailyLogSelectionHTML(session) {
      var cache = S.dailyLogReadCache || { days: [], weeks: [] };
      if (!cache.days.length) {
        return '<div class="small">Noch keine externen Daily-Log-Daten geladen.</div>';
      }
      ensureDailyLogWeekSelection(session);
      var weekOptions = cache.weeks.map(function (week) {
        var label = week.label + ' (' + week.start + ' → ' + week.end + ', ' + week.count + ' Tage)';
        return '<option value="' + esc(week.key) + '" ' + (session.dailyLogSelection.weekKey === week.key ? 'selected' : '') + '>' + esc(label) + '</option>';
      }).join('');
      return `
        <label>Auswahlmodus</label>
        <select onchange="patchDailyLogSelection('mode', this.value)">
          <option value="week" ${session.dailyLogSelection.mode === 'week' ? 'selected' : ''}>Kalenderwoche</option>
          <option value="range" ${session.dailyLogSelection.mode === 'range' ? 'selected' : ''}>Datumsbereich</option>
        </select>
        ${session.dailyLogSelection.mode === 'week' ? `
          <label>Woche</label>
          <select onchange="patchDailyLogSelection('weekKey', this.value)">${weekOptions}</select>
        ` : `
          <label>Startdatum</label>
          <input type="date" value="${esc(session.dailyLogSelection.rangeStart || '')}" onchange="patchDailyLogSelection('rangeStart', this.value)" />
          <label>Enddatum</label>
          <input type="date" value="${esc(session.dailyLogSelection.rangeEnd || '')}" onchange="patchDailyLogSelection('rangeEnd', this.value)" />
        `}
        <div class="small" style="margin-top:12px">Aktuelle Auswahl: <strong>${esc(getSelectedDailyLogLabel(session))}</strong></div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-v" onclick="applySelectedDailyLogWeekToSession()">Auswahl in Session-Felder übernehmen</button>
        </div>
      `;
    }

    function renderDailyLogPreviewHTML(session) {
      var days = getSelectedDailyLogDays(session);
      if (!days.length) {
        return '<div class="small">Für die aktuelle Auswahl liegen keine robust erkannten Daily-Log-Tage vor.</div>';
      }
      return `
        <div class="small" style="margin-bottom:10px">Quelle: ${esc(session.dailyLogReadMeta.sourceGistId || S.dailyLogReadCache.gistId || '—')} · Datei: ${esc(session.dailyLogReadMeta.sourceFile || S.dailyLogReadCache.fileName || '—')}</div>
        <div class="small" style="margin-bottom:10px">Auswahl: <strong>${esc(getSelectedDailyLogLabel(session))}</strong></div>
        <table class="table-lite">
          <tr><th>Datum</th><th>Notizen</th><th>Aufgaben</th><th>Ereignisse</th><th>Migrationen</th></tr>
          ${days.map(function (day) {
            return '<tr>' +
              '<td>' + esc(day.date || '—') + '</td>' +
              '<td>' + (day.notes ? 'ja' : '—') + '</td>' +
              '<td>' + day.tasks.length + '</td>' +
              '<td>' + day.events.length + '</td>' +
              '<td>' + day.migrations.length + '</td>' +
            '</tr>';
          }).join('')}
        </table>
        <div class="notice" style="margin-top:12px">Felder ohne robuste Ableitung werden beim Übernehmen nicht künstlich erfunden. Sie bleiben leer oder unverändert.</div>
      `;
    }

    function renderTaskOverviewTable(items, emptyText) {
      if (!items || !items.length) return '<div class="small">' + esc(emptyText) + '</div>';
      return `
        <table class="table-lite">
          <tr><th>Datum</th><th>Aufgabe</th><th>Richtung</th><th>Ziel</th></tr>
          ${items.map(function (item) {
            return '<tr>' +
              '<td>' + esc(item.date || '—') + '</td>' +
              '<td>' + esc(item.text || '—') + '</td>' +
              '<td>' + esc(item.direction || '—') + '</td>' +
              '<td>' + esc(item.targetLabel || item.targetHorizon || '—') + '</td>' +
            '</tr>';
          }).join('')}

      `;

    function renderWeeklyTaskOverviewHTML(session) {
      var days = getSelectedDailyLogDays(session);
      var overview = buildWeeklyTaskOverview(days);
      return `
        <div class="notice">Die Trennung erfolgt nur, wenn der Zielhorizont aus den gelesenen Daily-Log-Daten robust hervorgeht.</div>
        <div class="qh" style="margin-top:0">Kurzfristig / konkret weitergeführt</div>
        ${renderTaskOverviewTable(overview.weeklyLog, 'Keine robust als Weekly Log erkennbaren Migrationen in der Auswahl.')}
        <div class="qh" style="margin-top:14px">In unspezifische Zukunft verschoben</div>
        ${renderTaskOverviewTable(overview.futureLog, 'Keine robust als Future Log erkennbaren Migrationen in der Auswahl.')}
        <div class="qh" style="margin-top:14px">Nicht sicher genug ableitbar</div>
        ${renderTaskOverviewTable(overview.uncertain, 'Keine unklaren Horizonte.')}
      `;

    function buildWeeklyTaskOverviewPromptText(session) {
      var overview = session.weeklyTaskOverview || { weeklyLog: [], futureLog: [], uncertain: [] };
      var lines = [];
      lines.push('WOCHENÜBERSICHT MIGRIERTER AUFGABEN');
      lines.push('');
      lines.push('Kurzfristig / konkret weitergeführt (Weekly Log):');
      if (overview.weeklyLog.length) overview.weeklyLog.forEach(function (item) { lines.push('- ' + (item.date || '—') + ' · ' + item.text + ' · Richtung: ' + (item.direction || '—') + ' · Ziel: ' + (item.targetLabel || item.targetHorizon || '—')); });
      else lines.push('- Keine robust ableitbaren Einträge');

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function getGistConfig() {
      return {
        token: (localStorage.getItem(GIST_TOKEN_KEY) || '').trim(),
        gistId: (localStorage.getItem(GIST_ID_KEY) || '').trim()
      };
    }

    function hasGistConfig() {
      var cfg = getGistConfig();
      return !!(cfg.token && cfg.gistId);
    }

    function gistStatusText() {
      if (!hasGistConfig()) return 'Nicht konfiguriert';
      return 'Bereit · Datei: ' + GIST_FILE;
    }

    function setGistToken(value) {
      if ((value || '').trim()) localStorage.setItem(GIST_TOKEN_KEY, value.trim());
      else localStorage.removeItem(GIST_TOKEN_KEY);
      renderAll();
      toast('Token lokal gespeichert');
    }

    function setGistId(value) {
      if ((value || '').trim()) localStorage.setItem(GIST_ID_KEY, value.trim());
      else localStorage.removeItem(GIST_ID_KEY);
      renderAll();
      toast('Gist-ID lokal gespeichert');
    }

    function clearGistConfig() {
      var ok = confirm('GitHub-Token und Gist-ID wirklich lokal löschen?');
      if (!ok) return;
      localStorage.removeItem(GIST_TOKEN_KEY);
      localStorage.removeItem(GIST_ID_KEY);
      renderAll();
      toast('Gist-Konfiguration gelöscht');
    }

    function githubHeaders(token, includeContentType) {
      var h = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json'
      };
      if (includeContentType) h['Content-Type'] = 'application/json';
      return h;
    }

    async function fetchWithTimeoutRetry(url, options, timeoutMs, retries) {
      var lastErr = null;
      var maxRetries = retries || 0;
      for (var attempt = 0; attempt <= maxRetries; attempt++) {
        var controller = new AbortController();
        var timer = setTimeout(function () { controller.abort(); }, timeoutMs || 15000);
        try {
          var opts = Object.assign({}, options || {}, { signal: controller.signal });
          var res = await fetch(url, opts);
          clearTimeout(timer);
          return res;
        } catch (e) {
          clearTimeout(timer);
          lastErr = e;
          if (attempt >= maxRetries) throw e;
        }
      }
      throw lastErr || new Error('Fetch fehlgeschlagen');
    }

    function collectSyncPayload() {
      return {
        version: S.version || 1,
        exported: new Date().toISOString(),
        app: 'Weekly Review Orchestrator',
        S: deepClone(S)
      };
    }

    function parseRemotePayload(text) {
      var parsed = JSON.parse(text);
      if (parsed && parsed.S) return parsed;
      if (parsed && parsed.sessions) {
        return {
          version: parsed.version || 1,
          exported: parsed._lastExported || new Date().toISOString(),
          app: 'Weekly Review Orchestrator',
          S: parsed
        };
      }
      throw new Error('Ungültiges Sync-JSON');
    }

    function getRemoteFileFromResponse(json) {
      var file = json && json.files && json.files[GIST_FILE];
      if (!file) throw new Error('Datei "' + GIST_FILE + '" nicht im Gist gefunden');
      return file;
    }

    async function gistGetRemotePayload(token, gistId) {
      var res = await fetchWithTimeoutRetry(GIST_API_ROOT + encodeURIComponent(gistId), {
        headers: githubHeaders(token)
      }, 15000, 1);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var json = await res.json();
      var file = getRemoteFileFromResponse(json);
      return {
        raw: json,
        file: file,
        payload: parseRemotePayload(file.content)
      };
    }

    function tsValue(value) {
      var t = Date.parse(value || '');
      return isNaN(t) ? 0 : t;
    }

    function newerIso(a, b) {
      return tsValue(a) >= tsValue(b) ? (a || b || new Date().toISOString()) : (b || a || new Date().toISOString());
    }

    function applySyncPayload(payload) {
      if (!payload || !payload.S) throw new Error('Sync-Payload ohne State');
      S = deepClone(payload.S);
      if (!Array.isArray(S.sessions)) S.sessions = [];
      if (!S.currentTab) S.currentTab = 'dashboard';
      if (!S.dailyLogReadCache) {
        S.dailyLogReadCache = {
          loadedAt: '', gistId: '', fileName: '', sourceKind: 'external_read_only_gist', rawText: '', days: [], weeks: []
        };
      }
      if (!S.sessions.length) {
        var first = blankSession();
        S.sessions = [first];
        S.currentSessionId = first.id;
      }
      if (!getSession()) S.currentSessionId = S.sessions[0].id;
      normalizeState();
      S._lastExported = payload.exported || S._lastExported || new Date().toISOString();
      save(true, true, true);
      renderAll();
    }

    function sessionComparable(session) {
      var c = deepClone(session);
      delete c.updatedAt;
      delete c.createdAt;
      return JSON.stringify(c);
    }

    function newerSession(a, b) {
      var aTs = tsValue((a && (a.updatedAt || a.createdAt)) || '');
      var bTs = tsValue((b && (b.updatedAt || b.createdAt)) || '');
      return aTs >= bTs ? deepClone(a) : deepClone(b);
    }

    function mergeStates(localState, remoteState) {
      var merged = {
        version: Math.max((localState && localState.version) || 1, (remoteState && remoteState.version) || 1),
        currentTab: (localState && localState.currentTab) || (remoteState && remoteState.currentTab) || 'dashboard',
        currentSessionId: (localState && localState.currentSessionId) || (remoteState && remoteState.currentSessionId) || '',
        sessions: [],
        _lastExported: newerIso((localState && localState._lastExported) || '', (remoteState && remoteState._lastExported) || '')
      };

      var sessionMap = {};
      (localState.sessions || []).forEach(function (session) {
        if (session && session.id) sessionMap[session.id] = deepClone(session);
      });

      (remoteState.sessions || []).forEach(function (remoteSession) {
        if (!remoteSession || !remoteSession.id) return;
        var existing = sessionMap[remoteSession.id];
        if (!existing) {
          sessionMap[remoteSession.id] = deepClone(remoteSession);
          return;
        }
        if (sessionComparable(existing) === sessionComparable(remoteSession)) {
          sessionMap[remoteSession.id] = newerSession(existing, remoteSession);
          return;
        }
        var newer = newerSession(existing, remoteSession);
        var newerIsExisting = sessionComparable(newer) === sessionComparable(existing);
        var older = newerIsExisting ? deepClone(remoteSession) : deepClone(existing);
        sessionMap[remoteSession.id] = newer;
        var conflict = deepClone(older);
        conflict.id = uid();
        conflict.weekLabel = (conflict.weekLabel || 'Session') + ' (Konfliktkopie)';
        conflict.updatedAt = new Date().toISOString();
        sessionMap[conflict.id] = conflict;
      });

      merged.sessions = Object.keys(sessionMap).map(function (key) {
        return sessionMap[key];
      }).sort(function (a, b) {
        return tsValue((b && (b.updatedAt || b.createdAt)) || '') - tsValue((a && (a.updatedAt || a.createdAt)) || '');
      });

      if (!merged.sessions.length) {
        var first = blankSession();
        merged.sessions = [first];
        merged.currentSessionId = first.id;
      } else if (!merged.sessions.find(function (session) { return session.id === merged.currentSessionId; })) {
        merged.currentSessionId = merged.sessions[0].id;
      }

      if (!merged.dailyLogReadCache) {
        merged.dailyLogReadCache = {
          loadedAt: '', gistId: '', fileName: '', sourceKind: 'external_read_only_gist', rawText: '', days: [], weeks: []
        };
      }

      return merged;
    }

    function gistAutoSyncDebounced() {
      clearTimeout(autoSyncTimer);
      if (!hasGistConfig()) return;
      autoSyncTimer = setTimeout(function () {
        gistPush(true, false).catch(function (err) {
          console.warn('[Gist Auto Sync]', err);
        });
      }, AUTO_SYNC_DELAY);
    }

    async function gistPush(silent, force) {
      var cfg = getGistConfig();
      if (!cfg.token || !cfg.gistId) {
        var missingMsg = 'Gist-Konfiguration fehlt';
        if (!silent) toast(missingMsg);
        throw new Error(missingMsg);
      }

      var payload = collectSyncPayload();

      if (!force) {
        try {
          var remote = await gistGetRemotePayload(cfg.token, cfg.gistId);
          var remoteTs = tsValue((remote.payload && (remote.payload.exported || (remote.payload.S && remote.payload.S._lastExported))) || '');
          var localTs = tsValue(payload.exported);
          if (remoteTs > localTs) {
            var msg = 'Cloud-Stand ist neuer. Nutze Merge oder Herunterladen.';
            if (!silent) alert(msg);
            throw new Error(msg);
          }
        } catch (e) {
          var text = String((e && e.message) || e || '');
          if (text.indexOf('Cloud-Stand ist neuer') !== -1) throw e;
          if (text.indexOf('Datei "' + GIST_FILE + '" nicht im Gist gefunden') === -1) {
            console.warn('[Gist Push] Versionscheck übersprungen:', e);
          }
        }
      }

      var files = {};
      files[GIST_FILE] = { content: JSON.stringify(payload, null, 2) };

      var res = await fetchWithTimeoutRetry(GIST_API_ROOT + encodeURIComponent(cfg.gistId), {
        method: 'PATCH',
        headers: githubHeaders(cfg.token, true),
        body: JSON.stringify({ files: files })
      }, 15000, 1);

      if (!res.ok) throw new Error('HTTP ' + res.status);

      S._lastExported = payload.exported;
      save(true, true, true);
      if (!silent) toast('In Gist gespeichert');
      return true;
    }

    async function gistPull() {
      var cfg = getGistConfig();
      if (!cfg.token || !cfg.gistId) {
        toast('Bitte erst Token und Gist-ID eintragen');
        return;
      }
      try {
        var remote = await gistGetRemotePayload(cfg.token, cfg.gistId);
        var remoteTs = tsValue((remote.payload && (remote.payload.exported || (remote.payload.S && remote.payload.S._lastExported))) || '');
        var localTs = tsValue(S._lastExported || '');
        if (localTs > remoteTs) {
          var ok = confirm('Lokal ist neuer als Cloud. Wirklich aus dem Gist laden und lokal überschreiben?');
          if (!ok) return;
        }
        applySyncPayload(remote.payload);
        toast('Cloud-Stand geladen');
      } catch (e) {
        alert('Fehler beim Laden aus dem Gist: ' + ((e && e.message) || e));
      }
    }

    async function mergeFromGist() {
      var cfg = getGistConfig();
      if (!cfg.token || !cfg.gistId) {
        toast('Bitte erst Token und Gist-ID eintragen');
        return;
      }

      var getRes, remotePayload, mergedState;

      try {
        getRes = await fetchWithTimeoutRetry(GIST_API_ROOT + encodeURIComponent(cfg.gistId), {
          headers: githubHeaders(cfg.token)
        }, 15000, 1);
        if (!getRes.ok) throw new Error('HTTP ' + getRes.status);
      } catch (e) {
        console.error('[Merge] Schritt 1 – GET fehlgeschlagen:', e);
        alert('Netzwerkfehler beim Abrufen des Gist (Schritt 1): ' + ((e && e.message) || e));
        return;
      }

      try {
        var json = await getRes.json();
        var file = getRemoteFileFromResponse(json);
        remotePayload = parseRemotePayload(file.content);
      } catch (e) {
        console.error('[Merge] Schritt 2 – JSON-Parse fehlgeschlagen:', e);
        alert('Fehler beim Lesen des Cloud-JSON (Schritt 2): ' + ((e && e.message) || e));
        return;
      }

      try {
        mergedState = mergeStates(S, remotePayload.S || {});
      } catch (e) {
        console.error('[Merge] Schritt 3 – Lokaler Merge-Fehler:', e);
        alert('Lokaler Merge-Fehler (Schritt 3): ' + ((e && e.message) || e));
        return;
      }

      try {
        var mergedPayload = {
          version: mergedState.version || 1,
          exported: new Date().toISOString(),
          app: 'Weekly Review Orchestrator',
          S: mergedState
        };
        var files = {};
        files[GIST_FILE] = { content: JSON.stringify(mergedPayload, null, 2) };
        var writeRes = await fetchWithTimeoutRetry(GIST_API_ROOT + encodeURIComponent(cfg.gistId), {
          method: 'PATCH',
          headers: githubHeaders(cfg.token, true),
          body: JSON.stringify({ files: files })
        }, 15000, 1);
        if (!writeRes.ok) throw new Error('HTTP ' + writeRes.status);
        S = mergedState;
        S._lastExported = mergedPayload.exported;
        normalizeState();
        save(true, true, true);
        renderAll();
        toast('Merge abgeschlossen');
      } catch (e) {
        console.error('[Merge] Schritt 4 – PATCH fehlgeschlagen:', e);
        alert('Merge lokal OK, aber Cloud-Write fehlgeschlagen (Schritt 4): ' + ((e && e.message) || e));
      }
    }

    async function gistSyncOnStart() {
      if (hasTriedStartupSync) return;
      hasTriedStartupSync = true;
      if (!hasGistConfig()) return;
      try {
        var cfg = getGistConfig();
        var remote = await gistGetRemotePayload(cfg.token, cfg.gistId);
        var remoteTs = tsValue((remote.payload && (remote.payload.exported || (remote.payload.S && remote.payload.S._lastExported))) || '');
        var localTs = tsValue(S._lastExported || '');
        if (remoteTs > localTs) {
          applySyncPayload(remote.payload);
          toast('Neuerer Cloud-Stand geladen');
        }
      } catch (e) {
        console.warn('[Gist Sync Start]', e);
      }
    }

    function exportJSON() {
      var session = getSession();
      if (!session) return;
      downloadFile('weekly-review-' + safeName(session.weekLabel || today()) + '.json', JSON.stringify({ version: 1, exported: new Date().toISOString(), session: session }, null, 2), 'application/json');
      toast('JSON exportiert');
    }

    function exportMarkdown() {
      var session = getSession();
      if (!session) return;
      var md = buildMarkdown(session);
      downloadFile('weekly-review-' + safeName(session.weekLabel || today()) + '.md', md, 'text/markdown');
      toast('Markdown exportiert');
    }

    function buildMarkdown(session) {
      var lines = [];
      lines.push('# Weekly Review – ' + (session.weekLabel || 'Ohne Titel'));
      lines.push('');
      lines.push('- Review-Datum: ' + (session.reviewDate || '—'));
      lines.push('- Letzter Weekly Log: ' + (session.lastWeeklyLogUrl || '—'));
      lines.push('- Fokus: ' + (session.currentFocus || '—'));
      lines.push('- Externe Daily-Log-Quelle: ' + (session.dailyLogReadMeta.sourceGistId || '—'));
      lines.push('- Daily-Log-Auswahl: ' + (session.dailyLogReadMeta.selectedLabel || getSelectedDailyLogLabel(session) || '—'));
      lines.push('');
      lines.push('## Schrittstatus');
      DEFAULT_STEPS.forEach(function (def) {
        var st = session.steps.find(function (s) { return s.id === def.id; }) || {};
        lines.push('- [' + (st.done ? 'x' : ' ') + '] ' + def.title + ' (' + def.minutes + ' Min.)');
        if (st.notes) lines.push('  - Notizen: ' + st.notes.replace(/\n/g, ' / '));
        if (st.artifacts) lines.push('  - Artefakte: ' + st.artifacts.replace(/\n/g, ' / '));
      });
      lines.push('');
      var fields = [
        ['Daily Notes', session.dailyNotesRaw],
        ['Bullet Journal', session.bulletJournalRaw],
        ['Umgewandelte Tage', session.convertedDays],
        ['Anmerkungen', session.annotations],
        ['Quantitative Daten', session.quantData],
        ['Migrierte Aufgaben', session.migratedTasks],
        ['Migrationshorizonte', buildWeeklyTaskOverviewPromptText(session)],
        ['Vorheriger Weekly-Log-Kontext', session.previousWeeklyLogSummary],
        ['Review-Ergebnis', session.reviewResult],
        ['Nächste Woche', session.nextWeekPreview]
      ];
      fields.forEach(function (pair) {
        lines.push('## ' + pair[0]);
        lines.push('');
        lines.push(pair[1] || '—');
        lines.push('');
      });
      return lines.join('\n');
    }

    function safeName(s) {
      return String(s || 'export').toLowerCase().replace(/[^a-z0-9äöüß\- ]/gi, '').replace(/\s+/g, '-');
    }

    function downloadFile(name, content, mime) {
      var blob = new Blob([content], { type: mime || 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJSON() {
      var box = document.getElementById('importBox');
      if (!box) return;
      try {
        var parsed = JSON.parse(box.value);
        if (!parsed.session) throw new Error('Kein session-Feld gefunden');
        var session = parsed.session;
        session.id = uid();
        session.createdAt = new Date().toISOString();
        session.updatedAt = new Date().toISOString();
        S.sessions.unshift(session);
        S.currentSessionId = session.id;
        normalizeState();
        save();
        renderAll();
        box.value = '';
        toast('Session importiert');
      } catch (e) {
        toast('Import fehlgeschlagen');
      }
    }

    function resetCurrentSession() {
      var session = getSession();
      if (!session) return;
      var ok = confirm('Aktive Session wirklich zurücksetzen?');
      if (!ok) return;
      var fresh = blankSession();
      fresh.id = session.id;
      fresh.weekLabel = session.weekLabel;
      fresh.reviewDate = session.reviewDate;
      fresh.lastWeeklyLogUrl = session.lastWeeklyLogUrl;
      var idx = S.sessions.findIndex(function (s) { return s.id === session.id; });
      S.sessions[idx] = fresh;
      save();
      renderAll();
      toast('Session zurückgesetzt');
    }

    function renderAll() {
      var session = getSession();
      renderTabs();
      updateMeta();
      document.getElementById('panel-dashboard').innerHTML = dashboardHTML(session);
      document.getElementById('panel-steps').innerHTML = stepsHTML(session);
      document.getElementById('panel-prompts').innerHTML = promptsHTML(session);
      document.getElementById('panel-data').innerHTML = dataHTML(session);
      document.getElementById('panel-export').innerHTML = exportHTML(session);
      switchTab(S.currentTab || 'dashboard', true);
    }

    load();
    renderAll();
    gistSyncOnStart();
  </script>
</body>
</html>
