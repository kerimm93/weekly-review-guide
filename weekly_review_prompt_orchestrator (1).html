<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Weekly Review Orchestrator</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-mid: #16213e;
      --surface: #1e2a4a;
      --surface-2: #162038;
      --surface-3: #243555;
      --border: #2a4a7f;
      --border-light: #3a6aaf;
      --ink: #e8e8f0;
      --ink-light: #9999bb;
      --ink-dim: #555577;
      --gold: #ffb347;
      --gold-light: #ffd580;
      --purple: #9b59b6;
      --purple-light: #c39bd3;
      --purple-dark: #7d3c98;
      --green: #2ecc71;
      --green-dark: #1a8a4a;
      --red: #e74c3c;
      --red-dark: #c0392b;
      --blue: #3498db;
      --blue-dark: #2176ae;
      --teal: #1abc9c;
      --teal-dark: #16a085;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
      --radius: 12px;
      --touch-min: 44px;
      --fs-content: 16px;
      --fs-btn: 13px;
      --fs-label: 11px;
      --pixel: monospace;
      --body: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(155,89,182,0.09) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 15%, rgba(52,152,219,0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 85%, rgba(255,179,71,0.06) 0%, transparent 35%);
      color: var(--ink);
      font-family: var(--body);
      font-size: var(--fs-content);
      min-height: 100vh;
    }

    #app {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px;
    }

    .htbox {
      background: linear-gradient(135deg, #2d1b69, #1a0a4a);
      border: 2px solid var(--purple);
      box-shadow: 0 0 20px rgba(155,89,182,0.25);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .htbox h1 {
      margin: 0 0 8px 0;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.4px;
    }

    .sub {
      color: var(--ink-light);
      line-height: 1.55;
      font-size: 14px;
    }

    .top-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .meta-card,
    .qs {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .meta-card {
      padding: 12px 14px;
    }

    .meta-k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--ink-light);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .meta-v {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }

    .tab-row {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-wrap: nowrap;
      background: rgba(0,0,0,.26);
      border-radius: 10px 10px 0 0;
      padding: 4px 4px 0;
      margin-top: 14px;
    }
    .tab-row::-webkit-scrollbar { display: none; }

    .tab-btn {
      font-family: var(--body);
      font-weight: 700;
      font-size: 13px;
      padding: 12px 14px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--ink-light);
      white-space: nowrap;
      flex-shrink: 0;
      min-height: var(--touch-min);
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .panel-wrap {
      background: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      padding: 16px;
      min-height: 340px;
      border-radius: 0 0 10px 10px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .qh {
      font-weight: 800;
      font-size: 13px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .qs { padding: 14px 16px; margin-bottom: 14px; }

    .notice {
      background: rgba(255,179,71,.08);
      border-left: 3px solid var(--gold);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--ink-light);
      line-height: 1.6;
      border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
    }

    .notice.info { background: rgba(52,152,219,.08); border-left-color: var(--blue); }
    .notice.success { background: rgba(46,204,113,.08); border-left-color: var(--green); }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      font-family: var(--body);
      font-weight: 700;
      font-size: var(--fs-btn);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-height: var(--touch-min);
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .btn-q { background: linear-gradient(135deg, var(--gold), #e8960a); color: #1a0a00; }
    .btn-m { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: white; }
    .btn-v { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: white; }
    .btn-s { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }
    .btn-t { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; }
    .btn-d { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: white; }
    .btn:disabled { opacity: .42; cursor: not-allowed; }

    input, textarea, select {
      width: 100%;
      background: rgba(0,0,0,.24);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--body);
      font-size: var(--fs-content);
      padding: 10px 12px;
      min-height: var(--touch-min);
      border-radius: 8px;
    }

    textarea { resize: vertical; min-height: 120px; }
    textarea.compact { min-height: 84px; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(155,89,182,.18);
    }

    label {
      display: block;
      margin: 12px 0 6px 0;
      font-size: var(--fs-label);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .55px;
      color: var(--ink-light);
    }

    .step-list { display: grid; gap: 12px; }

    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .step-head {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: start;
    }

    .step-title {
      font-weight: 800;
      font-size: 18px;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .step-sub {
      color: var(--ink-light);
      font-size: 13px;
      line-height: 1.55;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      border-radius: 999px;
      padding: 0 11px;
      border: 1px solid var(--border);
      color: var(--ink-light);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(0,0,0,.18);
    }

    .step-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .step-meta {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink-light);
      margin-top: 10px;
    }

    .check-row input[type="checkbox"] {
      width: 20px;
      min-height: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .progress {
      height: 12px;
      background: rgba(0,0,0,.28);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      transition: width .2s ease;
    }

    .prompt-output {
      min-height: 360px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
    }

    .small {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.55;
    }

    .session-list {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
    }

    .session-item {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.2);
      cursor: pointer;
    }

    .session-item.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(255,179,71,.25) inset;
    }

    .session-item strong { display: block; margin-bottom: 6px; }

    .kv {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 8px;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .kv .k { color: var(--ink-light); font-weight: 700; }

    .table-lite {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-lite th,
    .table-lite td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    .table-lite th {
      color: var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: var(--purple-dark);
      border: 1px solid var(--purple);
      border-radius: 999px;
      padding: 4px 9px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    #toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--purple);
      color: var(--gold);
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
      transform: translateY(90px);
      opacity: 0;
      transition: all .2s ease;
      z-index: 999;
      font-size: 13px;
      font-weight: 700;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .grid-2, .grid-3, .top-meta, .step-meta {
        grid-template-columns: 1fr;
      }
      .step-head {
        grid-template-columns: 1fr;
      }
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="htbox">
      <h1>Weekly Review Orchestrator</h1>
      <div class="sub">
        Leit-App für deinen Weekly-Review-Ablauf mit Prompt-Weitergabe. Sie bildet den groben Neurolist-Flow ab,
        hält Session-Daten lokal fest und generiert dir pro Schritt kopierbare GPT-Prompts.
      </div>
      <div class="top-meta">
        <div class="meta-card">
          <div class="meta-k">Aktive Woche</div>
          <div class="meta-v" id="metaWeek">—</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Fortschritt</div>
          <div class="meta-v" id="metaProgress">0 / 7</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Offene Minuten</div>
          <div class="meta-v" id="metaMinutes">100</div>
        </div>
        <div class="meta-card">
          <div class="meta-k">Zuletzt gespeichert</div>
          <div class="meta-v" id="metaSaved" style="font-size:14px;color:var(--ink)">—</div>
        </div>
      </div>
    </div>

    <div class="tab-row" id="tabRow"></div>
    <div class="panel-wrap">
      <section class="panel active" id="panel-dashboard"></section>
      <section class="panel" id="panel-steps"></section>
      <section class="panel" id="panel-prompts"></section>
      <section class="panel" id="panel-data"></section>
      <section class="panel" id="panel-export"></section>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    var LKEY = 'weekly_review_orchestrator_v1';

    var TABS = [
      { id: 'dashboard', label: 'Dashboard' },
      { id: 'steps', label: 'Schritte' },
      { id: 'prompts', label: 'Prompt Studio' },
      { id: 'data', label: 'Session-Daten' },
      { id: 'export', label: 'Export' }
    ];

    var DEFAULT_STEPS = [
      {
        id: 'finish_daily_notes',
        title: 'Letzte Daily Notes fertigstellen',
        minutes: 20,
        icon: '🧾',
        summary: 'Die Rohbasis schließen, bevor du in Konvertierung und Review gehst.',
        purpose: 'Stellt sicher, dass deine Wochenbasis vollständig ist und die Review nicht auf halben Notizen läuft.',
        promptType: 'finishDailyNotes'
      },
      {
        id: 'convert_days',
        title: 'Tage der Woche aus dem Bullet Journal in ChatGPT umwandeln (für Obsidian-Format)',
        minutes: 15,
        icon: '↩️',
        summary: 'Tagesblöcke in ein strukturiertes, weiterverarbeitbares Format überführen.',
        purpose: 'Erzeugt sauberere Eingaben für Annotationen, spätere Review und Obsidian-Weiterverarbeitung.',
        promptType: 'convertDays'
      },
      {
        id: 'review_days_new_format',
        title: 'Tage der Woche im neuen Format überfliegen und Anmerkungen diktieren',
        minutes: 15,
        icon: '🎤',
        summary: 'Erste Muster, Lücken, Beobachtungen und Zusatzgedanken festhalten.',
        purpose: 'Bringt deine zweite Verarbeitungsschicht rein, bevor die eigentliche Weekly Review startet.',
        promptType: 'reviewAnnotations'
      },
      {
        id: 'save_quant_data',
        title: 'Quantitative Daten speichern (für Auswertung)',
        minutes: 10,
        icon: '💾',
        summary: 'Stimmungs-, Zeit-, Habit- und Bewegungsdaten als Wocheninput sichern.',
        purpose: 'Schafft die optionale Datengrundlage für Mustererkennung über dein Erleben hinaus.',
        promptType: 'quantData'
      },
      {
        id: 'migrate_tasks',
        title: 'Aufgaben aus dem Bullet Journal migrieren',
        minutes: 15,
        icon: '➡️',
        summary: 'Offene Aufgaben in ein klares Folgesystem übertragen.',
        purpose: 'Verhindert, dass die Review endet und lose offene Fäden im Bullet Journal hängen bleiben.',
        promptType: 'migrateTasks'
      },
      {
        id: 'open_last_weekly_log',
        title: 'Weekly Log Chat öffnen (letzte Woche) für Prompts und Schritt-für-Schritt-Anleitung',
        minutes: 5,
        icon: '💬',
        summary: 'Alten Weekly-Log-Kontext und Review-Regeln wieder in Reichweite bringen.',
        purpose: 'Holt den Review-Workflow mit seinen Betriebsmodi, Eingaberegeln und Promptstrukturen wieder nach vorn.',
        promptType: 'openLastWeeklyLog'
      },
      {
        id: 'write_current_weekly_review',
        title: 'Aktuelle Weekly Review im Weekly Log Chat schreiben',
        minutes: 20,
        icon: '🖊️',
        summary: 'Die eigentliche Weekly Review auf Basis aller vorbereiteten Inputs starten.',
        purpose: 'Jetzt wird aus Material eine vollständige Review mit klarer Trennung von Beobachtung, Interpretation und Entscheidung.',
        promptType: 'startWeeklyReview'
      }
    ];

    var S = {
      version: 1,
      currentTab: 'dashboard',
      currentSessionId: '',
      sessions: []
    };

    function uid() {
      return String(Date.now()) + String(Math.random()).slice(2, 8);
    }

    function today() {
      return new Date().toISOString().split('T')[0];
    }

    function todayDE() {
      return new Date().toLocaleDateString('de-DE');
    }

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2200);
    }

    function blankSession() {
      var steps = DEFAULT_STEPS.map(function (step) {
        return {
          id: step.id,
          done: false,
          notes: '',
          artifacts: '',
          promptNotes: ''
        };
      });
      return {
        id: uid(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        weekLabel: 'KW ' + guessWeekLabel(),
        reviewDate: today(),
        lastWeeklyLogUrl: '',
        targetChat: 'Weekly Log Chat',
        currentFocus: '',
        weeklyIntent: '',
        dailyNotesRaw: '',
        bulletJournalRaw: '',
        convertedDays: '',
        annotations: '',
        quantData: '',
        migratedTasks: '',
        previousWeeklyLogSummary: '',
        reviewResult: '',
        nextWeekPreview: '',
        steps: steps,
        promptHistory: []
      };
    }

    function guessWeekLabel() {
      var d = new Date();
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return weekNo + ' – ' + d.getUTCFullYear();
    }

    function load() {
      try {
        var raw = localStorage.getItem(LKEY);
        if (raw) S = JSON.parse(raw);
      } catch (e) {}
      if (!Array.isArray(S.sessions)) S.sessions = [];
      if (!S.currentTab) S.currentTab = 'dashboard';
      if (!S.sessions.length) {
        var first = blankSession();
        S.sessions.push(first);
        S.currentSessionId = first.id;
      }
      if (!getSession()) {
        S.currentSessionId = S.sessions[0].id;
      }
      normalizeState();
    }

    function normalizeState() {
      S.sessions.forEach(function (session) {
        if (!session.steps || !session.steps.length) {
          session.steps = blankSession().steps;
        }
        DEFAULT_STEPS.forEach(function (def) {
          var existing = session.steps.find(function (s) { return s.id === def.id; });
          if (!existing) session.steps.push({ id: def.id, done: false, notes: '', artifacts: '', promptNotes: '' });
        });
        session.updatedAt = session.updatedAt || session.createdAt || new Date().toISOString();
      });
    }

    function save() {
      var session = getSession();
      if (session) session.updatedAt = new Date().toISOString();
      try {
        localStorage.setItem(LKEY, JSON.stringify(S));
      } catch (e) {}
      updateMeta();
    }

    function getSession() {
      return S.sessions.find(function (s) { return s.id === S.currentSessionId; }) || null;
    }

    function getStepData(stepId) {
      var session = getSession();
      if (!session) return null;
      return session.steps.find(function (s) { return s.id === stepId; }) || null;
    }

    function switchTab(tabId) {
      S.currentTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.panel').forEach(function (panel) {
        panel.classList.toggle('active', panel.id === 'panel-' + tabId);
      });
      save();
    }

    function renderTabs() {
      var row = document.getElementById('tabRow');
      row.innerHTML = TABS.map(function (tab) {
        return '<button class="tab-btn ' + (tab.id === S.currentTab ? 'active' : '') + '" data-tab="' + tab.id + '" onclick="switchTab(\'' + tab.id + '\')">' + esc(tab.label) + '</button>';
      }).join('');
    }

    function stepDefinition(stepId) {
      return DEFAULT_STEPS.find(function (s) { return s.id === stepId; });
    }

    function completedCount(session) {
      return session.steps.filter(function (s) { return s.done; }).length;
    }

    function remainingMinutes(session) {
      var total = 0;
      DEFAULT_STEPS.forEach(function (def) {
        var st = session.steps.find(function (s) { return s.id === def.id; });
        if (!st || !st.done) total += def.minutes;
      });
      return total;
    }

    function updateMeta() {
      var session = getSession();
      if (!session) return;
      document.getElementById('metaWeek').textContent = session.weekLabel || '—';
      document.getElementById('metaProgress').textContent = completedCount(session) + ' / ' + DEFAULT_STEPS.length;
      document.getElementById('metaMinutes').textContent = String(remainingMinutes(session));
      document.getElementById('metaSaved').textContent = session.updatedAt ? new Date(session.updatedAt).toLocaleString('de-DE') : '—';
    }

    function patchSession(field, value) {
      var session = getSession();
      if (!session) return;
      session[field] = value;
      save();
      renderAll();
    }

    function patchStep(stepId, field, value) {
      var st = getStepData(stepId);
      if (!st) return;
      st[field] = value;
      save();
      renderAll();
    }

    function newSession() {
      var s = blankSession();
      S.sessions.unshift(s);
      S.currentSessionId = s.id;
      save();
      renderAll();
      toast('Neue Weekly-Review-Session angelegt');
    }

    function deleteSession() {
      if (S.sessions.length <= 1) {
        toast('Mindestens eine Session muss bleiben');
        return;
      }
      var session = getSession();
      if (!session) return;
      var ok = confirm('Aktive Session wirklich löschen?');
      if (!ok) return;
      S.sessions = S.sessions.filter(function (s) { return s.id !== session.id; });
      S.currentSessionId = S.sessions[0].id;
      save();
      renderAll();
      toast('Session gelöscht');
    }

    function duplicateSession() {
      var session = getSession();
      if (!session) return;
      var copy = JSON.parse(JSON.stringify(session));
      copy.id = uid();
      copy.createdAt = new Date().toISOString();
      copy.updatedAt = new Date().toISOString();
      copy.weekLabel = session.weekLabel + ' (Kopie)';
      S.sessions.unshift(copy);
      S.currentSessionId = copy.id;
      save();
      renderAll();
      toast('Session dupliziert');
    }

    function switchSession(id) {
      S.currentSessionId = id;
      save();
      renderAll();
    }

    function buildPrompt(type, copyDirectly) {
      var session = getSession();
      if (!session) return '';
      var prompt = buildPromptText(type, session);
      if (copyDirectly) {
        navigator.clipboard.writeText(prompt).then(function () {
          rememberPrompt(type, prompt);
          toast('Prompt kopiert');
        }).catch(function () {
          rememberPrompt(type, prompt);
          toast('Kopieren fehlgeschlagen');
        });
      }
      return prompt;
    }

    function rememberPrompt(type, prompt) {
      var session = getSession();
      if (!session) return;
      session.promptHistory.unshift({
        id: uid(),
        type: type,
        createdAt: new Date().toISOString(),
        prompt: prompt
      });
      session.promptHistory = session.promptHistory.slice(0, 12);
      save();
    }

    function previewPrompt(type) {
      var prompt = buildPromptText(type, getSession());
      rememberPrompt(type, prompt);
      document.getElementById('promptOutput').textContent = prompt;
      switchTab('prompts');
      toast('Prompt im Studio angezeigt');
    }

    function copyPromptOutput() {
      var text = document.getElementById('promptOutput').textContent || '';
      navigator.clipboard.writeText(text).then(function () {
        toast('Ausgabe kopiert');
      }).catch(function () {
        toast('Kopieren fehlgeschlagen');
      });
    }

      var st = getStepData(stepId);

          'STARTE DIE WEEKLY REVIEW.',
          '',
          'INPUT 1 – DAILY NOTES DIESER WOCHE',
          session.dailyNotesRaw || 'Noch keine Daily Notes hinterlegt.',
          '',
          'INPUT 2 – EXTERNE WOCHEN-DATEN (OPTIONAL)',
          session.quantData || 'Keine quantitativen Daten hinterlegt.',
          '',
          'INPUT 3 – LETZTER WEEKLY LOG / KONTEXT',
          [session.previousWeeklyLogSummary, session.lastWeeklyLogUrl].filter(Boolean).join('\n') || 'Kein alter Weekly-Log-Kontext hinterlegt.',
          '',
          'ERGÄNZENDE INPUTS',
          'Umgewandelte Tage:',
          session.convertedDays || '—',
          '',
          'Annotationen:',
          session.annotations || '—',
          '',
          'Migrierte Aufgaben:',
          session.migratedTasks || '—',
          '',
          'REGELN',
          '- Markiere fehlende Tage oder Unklarheiten, bevor du interpretierst.',
          '- Trenne strikt Beobachtung, Interpretation und Entscheidung.',
          '- Wenn etwas nicht aus den Inputs hervorgeht, kennzeichne es als unsicher statt zu raten.',
          '- Integriere quantitative Daten nur dort, wo sie wirklich etwas stützen.',
          '- Die Review darf konkret werden, aber nicht in chaotische To-do-Listen kippen.',
          '',
          'ZUSATZ',
          sessionStepNotes('write_current_weekly_review') || 'Kein Zusatz.',
          '',
          'GEWÜNSCHTES ERGEBNIS',
          '1. Beobachtungen der Woche',
          '2. Interpretationen / Muster',
          '3. Entscheidungen / Konsequenzen',
          '4. Was nächste Woche besondere Aufmerksamkeit braucht',
          '5. Optional: Fokusfelder, Deadlines, handhabbare nächste Schritte'
        ].join('\n');
      }

      if (type === 'reviewSummary') {
        return [
          shared,
          '',
          'AUFGABE',
          'Verdichte meine aktuelle Weekly Review in eine saubere Nachbereitungsfassung.',
          '',
          'INPUT',
          session.reviewResult || 'Noch kein Review-Ergebnis hinterlegt.',
          '',
          'REGELN',
          '- Kompakt, aber nicht zu dünn.',
          '- Klare Trennung zwischen Erkenntnissen, Entscheidungen und nächster Woche.',
          '- Dinge, die eher Artefakte werden sollen, gesondert markieren (z. B. SOP, Proto-Atomic Note, Aufgabenliste).',
          '',
          'AUSGABEFORMAT',
          '## Wichtigste Erkenntnisse',
          '## Entscheidungen',
          '## Nächste Woche',
          '## Mögliche Folgeartefakte'
        ].join('\n');
      }

      return [shared, '', 'Kein Prompt für Typ: ' + type].join('\n');
    }

    function exportJSON() {
      var session = getSession();
      if (!session) return;
      downloadFile('weekly-review-' + safeName(session.weekLabel || today()) + '.json', JSON.stringify({ version: 1, exported: new Date().toISOString(), session: session }, null, 2), 'application/json');
      toast('JSON exportiert');
    }

    function exportMarkdown() {
      var session = getSession();
      if (!session) return;
      var md = buildMarkdown(session);
      downloadFile('weekly-review-' + safeName(session.weekLabel || today()) + '.md', md, 'text/markdown');
      toast('Markdown exportiert');
    }

    function buildMarkdown(session) {
      var lines = [];
      lines.push('# Weekly Review – ' + (session.weekLabel || 'Ohne Titel'));
      lines.push('');
      lines.push('- Review-Datum: ' + (session.reviewDate || '—'));
      lines.push('- Letzter Weekly Log: ' + (session.lastWeeklyLogUrl || '—'));
      lines.push('- Fokus: ' + (session.currentFocus || '—'));
      lines.push('');
      lines.push('## Schrittstatus');
      DEFAULT_STEPS.forEach(function (def) {
        var st = session.steps.find(function (s) { return s.id === def.id; }) || {};
        lines.push('- [' + (st.done ? 'x' : ' ') + '] ' + def.title + ' (' + def.minutes + ' Min.)');
        if (st.notes) lines.push('  - Notizen: ' + st.notes.replace(/\n/g, ' / '));
        if (st.artifacts) lines.push('  - Artefakte: ' + st.artifacts.replace(/\n/g, ' / '));
      });
      lines.push('');
      var fields = [
        ['Daily Notes', session.dailyNotesRaw],
        ['Bullet Journal', session.bulletJournalRaw],
        ['Umgewandelte Tage', session.convertedDays],
        ['Anmerkungen', session.annotations],
        ['Quantitative Daten', session.quantData],
        ['Migrierte Aufgaben', session.migratedTasks],
        ['Vorheriger Weekly-Log-Kontext', session.previousWeeklyLogSummary],
        ['Review-Ergebnis', session.reviewResult],
        ['Nächste Woche', session.nextWeekPreview]
      ];
      fields.forEach(function (pair) {
        lines.push('## ' + pair[0]);
        lines.push('');
        lines.push(pair[1] || '—');
        lines.push('');
      });
      return lines.join('\n');
    }

    function safeName(s) {
      return String(s || 'export').toLowerCase().replace(/[^a-z0-9äöüß\- ]/gi, '').replace(/\s+/g, '-');
    }

    function downloadFile(name, content, mime) {
      var blob = new Blob([content], { type: mime || 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJSON() {
      var box = document.getElementById('importBox');
      if (!box) return;
      try {
        var parsed = JSON.parse(box.value);
        if (!parsed.session) throw new Error('Kein session-Feld gefunden');
        var session = parsed.session;
        session.id = uid();
        session.createdAt = new Date().toISOString();
        session.updatedAt = new Date().toISOString();
        S.sessions.unshift(session);
        S.currentSessionId = session.id;
        normalizeState();
        save();
        renderAll();
        box.value = '';
        toast('Session importiert');
      } catch (e) {
        toast('Import fehlgeschlagen');
      }
    }

    function resetCurrentSession() {
      var session = getSession();
      if (!session) return;
      var ok = confirm('Aktive Session wirklich zurücksetzen?');
      if (!ok) return;
      var fresh = blankSession();
      fresh.id = session.id;
      fresh.weekLabel = session.weekLabel;
      fresh.reviewDate = session.reviewDate;
      fresh.lastWeeklyLogUrl = session.lastWeeklyLogUrl;
      var idx = S.sessions.findIndex(function (s) { return s.id === session.id; });
      S.sessions[idx] = fresh;
      save();
      renderAll();
      toast('Session zurückgesetzt');
    }

    function renderAll() {
      var session = getSession();
      renderTabs();
      updateMeta();
      document.getElementById('panel-dashboard').innerHTML = dashboardHTML(session);
      document.getElementById('panel-steps').innerHTML = stepsHTML(session);
      document.getElementById('panel-prompts').innerHTML = promptsHTML(session);
      document.getElementById('panel-data').innerHTML = dataHTML(session);
      document.getElementById('panel-export').innerHTML = exportHTML(session);
      switchTab(S.currentTab || 'dashboard');
    }

    load();
    renderAll();
  </script>
</body>
</html>
